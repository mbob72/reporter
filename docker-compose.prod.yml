services:
  reverse-proxy:
    image: caddy:2.9-alpine
    ports:
      - '80:80'
      - '443:443'
    environment:
      DOMAIN: ${DOMAIN}
      CADDY_EMAIL: ${CADDY_EMAIL}
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped

  api:
    image: ${API_IMAGE:-ghcr.io/example/reporter-api:latest}
    environment:
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-3000}
      API_CORS_ORIGINS: ${API_CORS_ORIGINS}
      GENERATED_REPORTS_DIR: ${GENERATED_REPORTS_DIR:-/var/lib/reporter/generated-reports}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
    volumes:
      - generated_reports:/var/lib/reporter/generated-reports
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/health').then((response)=>{if(!response.ok){process.exit(1);}}).catch(()=>process.exit(1));",
        ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
    restart: unless-stopped

  web:
    image: ${WEB_IMAGE:-ghcr.io/example/reporter-web:latest}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O /dev/null http://127.0.0.1:4200/ || exit 1']
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 15s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

volumes:
  generated_reports:
  redis_data:
  caddy_data:
  caddy_config:

services:
  api:
    build:
      context: .
      dockerfile: docker/api.dev.Dockerfile
    working_dir: /workspace
    command: >-
      bash -lc "pnpm install --frozen-lockfile && pnpm nx run report-api:serve"
    environment:
      PNPM_STORE_DIR: /pnpm/store
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-3000}
      API_CORS_ORIGINS: ${API_CORS_ORIGINS:-http://localhost:4200,http://127.0.0.1:4200}
      GENERATED_REPORTS_DIR: ${GENERATED_REPORTS_DIR:-/workspace/.generated-reports}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REPORT_JOB_REMOVE_ON_COMPLETE: ${REPORT_JOB_REMOVE_ON_COMPLETE:-false}
      REPORT_JOB_REMOVE_ON_FAIL: ${REPORT_JOB_REMOVE_ON_FAIL:-false}
      BULL_BOARD_ENABLED: ${BULL_BOARD_ENABLED:-true}
      BULL_BOARD_BASE_PATH: ${BULL_BOARD_BASE_PATH:-/admin/queues}
      BULL_BOARD_USERNAME: ${BULL_BOARD_USERNAME:-admin}
      BULL_BOARD_PASSWORD: ${BULL_BOARD_PASSWORD:-admin}
    ports:
      - '3000:3000'
    volumes:
      - .:/workspace
      - api_node_modules:/workspace/node_modules
      - api_pnpm_store:/pnpm/store
    depends_on:
      - redis
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/api.dev.Dockerfile
    working_dir: /workspace
    command: >-
      bash -lc "pnpm install --frozen-lockfile && pnpm start:worker"
    environment:
      PNPM_STORE_DIR: /pnpm/store
      GENERATED_REPORTS_DIR: ${GENERATED_REPORTS_DIR:-/workspace/.generated-reports}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
    volumes:
      - .:/workspace
      - worker_node_modules:/workspace/node_modules
      - worker_pnpm_store:/pnpm/store
    depends_on:
      - redis
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/web.dev.Dockerfile
    working_dir: /workspace
    command: >-
      bash -lc "pnpm install --frozen-lockfile && pnpm nx run report-web:serve"
    environment:
      PNPM_STORE_DIR: /pnpm/store
      WEB_HOST: ${WEB_HOST:-0.0.0.0}
      WEB_PORT: ${WEB_PORT:-4200}
      VITE_PROXY_TARGET: ${VITE_PROXY_TARGET:-http://api:3000}
    ports:
      - '4200:4200'
    volumes:
      - .:/workspace
      - web_node_modules:/workspace/node_modules
      - web_pnpm_store:/pnpm/store
    depends_on:
      - api
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  api_node_modules:
  api_pnpm_store:
  worker_node_modules:
  worker_pnpm_store:
  web_node_modules:
  web_pnpm_store:
  redis_data:
